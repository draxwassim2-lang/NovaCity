// ── Security ──
document.addEventListener('contextmenu', function(e){e.preventDefault();});
document.addEventListener('keydown', function(e){
  var m = e.ctrlKey||e.metaKey;
  if(m && (e.key==='u'||e.key==='U')){e.preventDefault();return false;}
  if(e.key==='F12'){e.preventDefault();return false;}
  if(m && e.shiftKey && 'ijcIJC'.includes(e.key)){e.preventDefault();return false;}
  if(m && (e.key==='s'||e.key==='S')){e.preventDefault();return false;}
  if(m && (e.key==='p'||e.key==='P')){e.preventDefault();return false;}
});
document.addEventListener('selectstart', function(e){
  if(!['INPUT','TEXTAREA'].includes(e.target.tagName)) e.preventDefault();
});

// ── Theme ──
var theme = localStorage.getItem('nc-theme')||'dark';
function applyTheme(t){
  document.body.setAttribute('data-theme',t);
  var m=document.getElementById('icon-moon'), s=document.getElementById('icon-sun');
  if(m) m.style.display = t==='dark'?'block':'none';
  if(s) s.style.display = t==='light'?'block':'none';
}
applyTheme(theme);
function toggleTheme(){theme=theme==='dark'?'light':'dark';localStorage.setItem('nc-theme',theme);applyTheme(theme);}
window.toggleTheme = toggleTheme;

// ── Scroll ──
window.addEventListener('scroll', function(){
  var nav = document.getElementById('main-nav');
  if(nav) nav.classList.toggle('scrolled', window.scrollY > 20);
},{passive:true});

// ── Page nav with transitions ──
var pages = ['home','laws','activation','creator'];
var navMap = {home:['nl-home','dl-home'],laws:['nl-laws','dl-laws'],activation:['nl-activation','dl-activation'],creator:['nl-creator','dl-creator']};
var curPage = 'home';

function goTo(id){
  if(id===curPage) return;
  var oldEl = document.getElementById('page-'+curPage);
  var newEl = document.getElementById('page-'+id);
  if(!oldEl||!newEl) return;
  oldEl.style.animation = 'pgOut .28s ease both';
  oldEl.addEventListener('animationend', function once(){
    oldEl.removeEventListener('animationend', once);
    oldEl.classList.remove('active'); oldEl.style.animation = '';
    newEl.classList.add('active');
    newEl.style.animation = 'pgIn .42s cubic-bezier(.22,1,.36,1) both';
    newEl.addEventListener('animationend', function once2(){newEl.removeEventListener('animationend',once2);newEl.style.animation='';});
  });
  Object.keys(navMap).forEach(function(k){
    navMap[k].forEach(function(lid){
      var el=document.getElementById(lid);
      if(el) el.classList.toggle('active',k===id);
    });
  });
  curPage = id;
  window.scrollTo({top:0, behavior:'smooth'});
  if(id==='creator'){
    setTimeout(function(){
      var f=document.getElementById('prog-fill'), l=document.getElementById('prog-label');
      if(f)f.style.width='65%'; if(l)l.textContent='65%';
    },600);
  }
}
window.goTo = goTo;

function spinNavLogo(){
  var img = document.getElementById('nav-logo-img');
  if(!img) return;
  img.style.transition = 'transform .65s cubic-bezier(.34,1.56,.64,1)';
  img.style.transform = 'rotate(360deg) scale(1.18)';
  setTimeout(function(){img.style.transform='rotate(0deg) scale(1)';setTimeout(function(){img.style.transition='';},700);},680);
}

// ── Accordion ──
function toggleAcc(hdr){
  var item=hdr.parentElement, body=item.querySelector('.acc-body'), open=item.classList.contains('open');
  document.querySelectorAll('.acc-item.open').forEach(function(i){i.classList.remove('open');i.querySelector('.acc-hdr').classList.remove('open');i.querySelector('.acc-body').classList.remove('open');});
  if(!open){item.classList.add('open');hdr.classList.add('open');body.classList.add('open');}
}
window.toggleAcc = toggleAcc;

// ── Tabs ──
function switchTab(e,id){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active');});
  e.currentTarget.classList.add('active');
  var pane=document.getElementById('tp-'+id); if(pane) pane.classList.add('active');
}
window.switchTab = switchTab;

// ── Typewriter ──
var twText = 'نحن سيرفر روبلوكس متخصص في لعب الأدوار الواقعية، نقدم تجربة لعب استثنائية مع مجتمع محترف وبيئة آمنة للجميع';
var twEl, twIdx=0, twDir=1;
function typeStep(){
  twEl = document.getElementById('tw-text');
  if(!twEl) return;
  if(twDir===1){
    twEl.textContent = twText.slice(0,twIdx++);
    if(twIdx>twText.length){twDir=-1;setTimeout(typeStep,2400);return;}
    setTimeout(typeStep, twIdx===1?900:52);
  } else {
    twEl.textContent = twText.slice(0,twIdx--);
    if(twIdx<0){twIdx=0;twDir=1;setTimeout(typeStep,900);return;}
    setTimeout(typeStep,20);
  }
}
setTimeout(typeStep,1400);

// ── Parallax blobs ──
document.addEventListener('mousemove', function(e){
  var mx=(e.clientX/window.innerWidth-.5)*18, my=(e.clientY/window.innerHeight-.5)*10;
  var bls=[['blob-tl','rotate(-12deg)',mx*.5,my*.5],['blob-tr','rotate(18deg)',-mx*.4,my*.4],['blob-br','rotate(-20deg)',-mx*.3,-my*.3],['blob-bm','rotate(8deg)',mx*.6,-my*.4],['blob-mr','rotate(30deg)',-mx*.25,my*.25],['blob-ml','rotate(-35deg)',mx*.35,-my*.3]];
  bls.forEach(function(d){var el=document.querySelector('.'+d[0]);if(el)el.style.transform=d[1]+' translate('+d[2]+'px,'+d[3]+'px)';});
},{passive:true});

// ── Button ripple ──
document.querySelectorAll('.btn').forEach(function(btn){
  btn.addEventListener('mousemove',function(e){
    var r=btn.getBoundingClientRect();
    btn.style.setProperty('--mx',((e.clientX-r.left)/r.width*100)+'%');
    btn.style.setProperty('--my',((e.clientY-r.top)/r.height*100)+'%');
  });
});

})();
</script>
